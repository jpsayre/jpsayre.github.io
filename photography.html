<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography - Jeff Sayre</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            cursor: pointer;
        }
        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            transition: transform 0.3s;
        }
        .gallery-item:hover img {
            transform: scale(1.05);
        }
        .gallery-item .caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0.75rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: #fff;
            font-size: 0.85rem;
        }
        .gallery-item .caption .title {
            font-weight: 600;
        }
        .gallery-item .caption .location {
            opacity: 0.8;
            font-size: 0.8rem;
        }
        .empty-state {
            color: #888;
            font-style: italic;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .lightbox.active {
            display: flex;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        .lightbox .lightbox-caption {
            position: absolute;
            bottom: 2rem;
            color: #fff;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="photography.html" class="active">Photography</a>
        <a href="travels.html">Travels</a>
        <a href="blog.html">Blog</a>
    </nav>
    <main>
        <h1>Photography</h1>
        <div class="gallery" id="gallery"></div>
    </main>

    <div class="lightbox" id="lightbox">
        <img id="lightbox-img" src="" alt="">
        <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>

    <script src="photos.js"></script>
    <script>
        const gallery = document.getElementById("gallery");
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightbox-img");
        const lightboxCaption = document.getElementById("lightbox-caption");

        if (PHOTOS.length === 0) {
            gallery.innerHTML = '<p class="empty-state">Photos coming soon.</p>';
        } else {
            PHOTOS.forEach(photo => {
                const item = document.createElement("div");
                item.className = "gallery-item";
                item.innerHTML =
                    '<img src="' + photo.file + '" alt="' + photo.title + '" loading="lazy">' +
                    '<div class="caption">' +
                        '<div class="title">' + photo.title + '</div>' +
                        (photo.location ? '<div class="location">' + photo.location + '</div>' : '') +
                    '</div>';
                item.addEventListener("click", () => {
                    lightboxImg.src = photo.file;
                    lightboxCaption.textContent = photo.title + (photo.location ? " — " + photo.location : "");
                    lightbox.classList.add("active");
                });
                gallery.appendChild(item);
            });
        }

        lightbox.addEventListener("click", () => {
            lightbox.classList.remove("active");
        });
    </script>
</body>
</html>
