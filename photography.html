<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography - Jeff Sayre</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="nav-brand">
            <a href="index.html" class="name">Jeff Sayre</a>
            <span class="subtitle">Chicago · engineer & data scientist</span>
        </div>
        <div class="nav-links">
            <a href="index.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="photography.html" class="active">Photography</a>
            <a href="travels.html">Travels</a>
            <a href="blog.html">Blog</a>
        </div>
    </nav>

    <div class="title-block">
        <div class="section-label">§ Photography</div>
        <h1 class="page-title">An unsorted archive.</h1>
    </div>

    <div class="photo-grid" id="gallery"></div>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close">&times;</button>
        <span class="lightbox-counter" id="lightbox-counter"></span>
        <button class="lightbox-nav lightbox-prev" id="lightbox-prev">&#8249;</button>
        <button class="lightbox-nav lightbox-next" id="lightbox-next">&#8250;</button>
        <img id="lightbox-img" src="" alt="">
        <div class="lightbox-info">
            <div class="lightbox-title" id="lightbox-title"></div>
            <div class="lightbox-location" id="lightbox-location"></div>
            <div class="lightbox-description" id="lightbox-description"></div>
        </div>
    </div>

    <footer>
        <span>© 2026 Jeff Sayre</span>
        <div class="footer-links">
            <span>jpsayre@gmail.com</span>
            <a href="https://www.linkedin.com/in/jeff-sayre-b3ab8924/" target="_blank">linkedin.com/in/jeff-sayre</a>
        </div>
    </footer>

    <script src="photos.js"></script>
    <script>
        var gallery = document.getElementById("gallery");
        var lightbox = document.getElementById("lightbox");
        var lightboxImg = document.getElementById("lightbox-img");
        var lightboxTitle = document.getElementById("lightbox-title");
        var lightboxLocation = document.getElementById("lightbox-location");
        var lightboxDescription = document.getElementById("lightbox-description");
        var lightboxCounter = document.getElementById("lightbox-counter");
        var currentIndex = 0;

        function openLightbox(index) {
            currentIndex = index;
            updateLightbox();
            lightbox.classList.add("active");
            document.body.style.overflow = "hidden";
        }

        function closeLightbox() {
            lightbox.classList.remove("active");
            document.body.style.overflow = "";
        }

        function updateLightbox() {
            var photo = PHOTOS[currentIndex];
            lightboxImg.src = photo.file;
            lightboxImg.alt = photo.title || "";
            lightboxTitle.textContent = photo.title || "";
            lightboxLocation.textContent = photo.location || "";
            lightboxDescription.textContent = photo.description || "";
            lightboxCounter.textContent = (currentIndex + 1) + " / " + PHOTOS.length;
        }

        function navigate(direction) {
            currentIndex = (currentIndex + direction + PHOTOS.length) % PHOTOS.length;
            updateLightbox();
        }

        if (PHOTOS.length === 0) {
            gallery.innerHTML = '<p class="empty-state">Photos coming soon.</p>';
        } else {
            PHOTOS.forEach(function(photo, index) {
                var tile = document.createElement("div");
                tile.className = "photo-tile" + ((index === 2 || index === 7) ? " tall" : "");
                tile.innerHTML = '<img src="' + photo.file + '" alt="' + (photo.title || "") + '" loading="lazy">';
                tile.addEventListener("click", function() { openLightbox(index); });
                gallery.appendChild(tile);
            });
        }

        document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
        document.getElementById("lightbox-prev").addEventListener("click", function(e) { e.stopPropagation(); navigate(-1); });
        document.getElementById("lightbox-next").addEventListener("click", function(e) { e.stopPropagation(); navigate(1); });
        lightbox.addEventListener("click", function(e) { if (e.target === lightbox) closeLightbox(); });
        document.addEventListener("keydown", function(e) {
            if (!lightbox.classList.contains("active")) return;
            if (e.key === "Escape") closeLightbox();
            if (e.key === "ArrowLeft") navigate(-1);
            if (e.key === "ArrowRight") navigate(1);
        });
    </script>
</body>
</html>
