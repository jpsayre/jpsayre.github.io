<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography - Jeff Sayre</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 6px;
            cursor: pointer;
            aspect-ratio: 4 / 3;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease, filter 0.4s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.05);
            filter: brightness(0.85);
        }
        .gallery-item .caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2.5rem 0.75rem 0.75rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.65));
            color: #fff;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .gallery-item:hover .caption {
            opacity: 1;
        }
        .gallery-item .caption .title {
            font-weight: 600;
        }
        .gallery-item .caption .location {
            opacity: 0.8;
            font-size: 0.8rem;
        }
        .empty-state {
            color: #888;
            font-style: italic;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .lightbox.active {
            display: flex;
            opacity: 1;
        }
        .lightbox img {
            max-width: 85%;
            max-height: 75vh;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 4px 40px rgba(0,0,0,0.5);
        }
        .lightbox-info {
            margin-top: 1.25rem;
            text-align: center;
            color: #fff;
            max-width: 600px;
        }
        .lightbox-info .lightbox-title {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .lightbox-info .lightbox-location {
            font-size: 0.9rem;
            color: #aaa;
            margin-top: 0.25rem;
        }
        .lightbox-info .lightbox-description {
            font-size: 0.9rem;
            color: #ccc;
            margin-top: 0.5rem;
            line-height: 1.5;
        }
        .lightbox-close {
            position: absolute;
            top: 1.25rem;
            right: 1.5rem;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
            background: none;
            border: none;
            line-height: 1;
        }
        .lightbox-close:hover {
            opacity: 1;
        }
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            font-size: 2.5rem;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
            background: none;
            border: none;
            padding: 1rem;
            user-select: none;
        }
        .lightbox-nav:hover {
            opacity: 1;
        }
        .lightbox-prev {
            left: 1rem;
        }
        .lightbox-next {
            right: 1rem;
        }
        .lightbox-counter {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            color: #888;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="photography.html" class="active">Photography</a>
        <a href="travels.html">Travels</a>
        <a href="blog.html">Blog</a>
    </nav>
    <main>
        <h1>Photography</h1>
        <div class="gallery" id="gallery"></div>
    </main>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close">&times;</button>
        <span class="lightbox-counter" id="lightbox-counter"></span>
        <button class="lightbox-nav lightbox-prev" id="lightbox-prev">&#8249;</button>
        <button class="lightbox-nav lightbox-next" id="lightbox-next">&#8250;</button>
        <img id="lightbox-img" src="" alt="">
        <div class="lightbox-info">
            <div class="lightbox-title" id="lightbox-title"></div>
            <div class="lightbox-location" id="lightbox-location"></div>
            <div class="lightbox-description" id="lightbox-description"></div>
        </div>
    </div>

    <script src="photos.js"></script>
    <script>
        const gallery = document.getElementById("gallery");
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightbox-img");
        const lightboxTitle = document.getElementById("lightbox-title");
        const lightboxLocation = document.getElementById("lightbox-location");
        const lightboxDescription = document.getElementById("lightbox-description");
        const lightboxCounter = document.getElementById("lightbox-counter");
        var currentIndex = 0;

        function openLightbox(index) {
            currentIndex = index;
            updateLightbox();
            lightbox.classList.add("active");
            document.body.style.overflow = "hidden";
        }

        function closeLightbox() {
            lightbox.classList.remove("active");
            document.body.style.overflow = "";
        }

        function updateLightbox() {
            var photo = PHOTOS[currentIndex];
            lightboxImg.src = photo.file;
            lightboxImg.alt = photo.title || "";
            lightboxTitle.textContent = photo.title || "";
            lightboxLocation.textContent = photo.location || "";
            lightboxDescription.textContent = photo.description || "";
            lightboxCounter.textContent = (currentIndex + 1) + " / " + PHOTOS.length;
        }

        function navigate(direction) {
            currentIndex = (currentIndex + direction + PHOTOS.length) % PHOTOS.length;
            updateLightbox();
        }

        if (PHOTOS.length === 0) {
            gallery.innerHTML = '<p class="empty-state">Photos coming soon.</p>';
        } else {
            PHOTOS.forEach(function(photo, index) {
                var item = document.createElement("div");
                item.className = "gallery-item";
                item.innerHTML =
                    '<img src="' + photo.file + '" alt="' + (photo.title || "") + '" loading="lazy">' +
                    '<div class="caption">' +
                        '<div class="title">' + (photo.title || "") + '</div>' +
                        (photo.location ? '<div class="location">' + photo.location + '</div>' : '') +
                    '</div>';
                item.addEventListener("click", function() { openLightbox(index); });
                gallery.appendChild(item);
            });
        }

        document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
        document.getElementById("lightbox-prev").addEventListener("click", function(e) {
            e.stopPropagation();
            navigate(-1);
        });
        document.getElementById("lightbox-next").addEventListener("click", function(e) {
            e.stopPropagation();
            navigate(1);
        });
        lightbox.addEventListener("click", function(e) {
            if (e.target === lightbox) closeLightbox();
        });

        document.addEventListener("keydown", function(e) {
            if (!lightbox.classList.contains("active")) return;
            if (e.key === "Escape") closeLightbox();
            if (e.key === "ArrowLeft") navigate(-1);
            if (e.key === "ArrowRight") navigate(1);
        });
    </script>
</body>
</html>
