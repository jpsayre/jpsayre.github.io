<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travels - JP Sayre</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        #globe-container {
            width: 100%;
            height: 70vh;
            min-height: 400px;
            position: relative;
            cursor: grab;
        }
        #globe-container:active {
            cursor: grabbing;
        }
        .location-list {
            margin-top: 2rem;
        }
        .location-list h2 {
            margin-bottom: 0.5rem;
        }
        .location-list ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1.5rem;
        }
        .location-list li {
            color: #555;
        }
        .location-list li::before {
            content: "\1F4CD ";
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="travels.html" class="active">Travels</a>
        <a href="blog.html">Blog</a>
    </nav>
    <main>
        <h1>Travels</h1>
        <div id="globe-container"></div>
        <div class="location-list">
            <h2>Places I've been</h2>
            <ul id="location-list"></ul>
        </div>
    </main>

    <script src="https://unpkg.com/globe.gl@2.35.1/dist/globe.gl.min.js"></script>
    <script>
        const container = document.getElementById("globe-container");

        const globe = Globe()(container)
            .globeImageUrl("https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg")
            .bumpImageUrl("https://unpkg.com/three-globe/example/img/earth-topology.png")
            .backgroundImageUrl("https://unpkg.com/three-globe/example/img/night-sky.png")
            .pointColor(() => "#ff4444")
            .pointRadius(0.5)
            .pointAltitude(0.01)
            .pointLabel("name")
            .pointLat("lat")
            .pointLng("lng")
            .width(container.clientWidth)
            .height(container.clientHeight);

        // Load locations from locations.json
        fetch("locations.json")
            .then(res => res.json())
            .then(locations => {
                globe.pointsData(locations);

                const listEl = document.getElementById("location-list");
                locations.forEach(loc => {
                    const li = document.createElement("li");
                    li.textContent = loc.name;
                    listEl.appendChild(li);
                });
            });

        // Resize handling
        window.addEventListener("resize", () => {
            globe.width(container.clientWidth);
            globe.height(container.clientHeight);
        });
    </script>
</body>
</html>
