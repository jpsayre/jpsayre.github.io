<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travels - Jeff Sayre</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        #globe-container {
            width: 100%;
            height: 70vh;
            min-height: 400px;
            position: relative;
            cursor: grab;
        }
        #globe-container:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="photography.html">Photography</a>
        <a href="travels.html" class="active">Travels</a>
        <a href="blog.html">Blog</a>
    </nav>
    <main>
        <h1>Travels</h1>
        <div id="globe-container"></div>
    </main>

    <script src="locations.js"></script>
    <script src="https://unpkg.com/globe.gl@2.35.1/dist/globe.gl.min.js"></script>
    <script>
        // Build the globe — same pattern as the original working version
        const container = document.getElementById("globe-container");
        const globe = Globe()
            .globeImageUrl("https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg")
            .bumpImageUrl("https://unpkg.com/three-globe/example/img/earth-topology.png")
            .backgroundImageUrl("https://unpkg.com/three-globe/example/img/night-sky.png")
            .pointsData(LOCATIONS)
            .pointLat("lat")
            .pointLng("lng")
            .pointColor(() => "#ff4444")
            .pointRadius(0.7)
            .pointAltitude(0)
            .pointLabel("name")
            .width(container.clientWidth)
            .height(container.clientHeight)
            (container);

        // Center on Chicago
        globe.pointOfView({ lat: 30, lng: -87.6, altitude: 2.5 });

        // Resize handling
        window.addEventListener("resize", () => {
            globe.width(container.clientWidth);
            globe.height(container.clientHeight);
        });

    </script>
</body>
</html>
