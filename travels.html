<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travels - JP Sayre</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        #globe-container {
            width: 100%;
            height: 70vh;
            min-height: 400px;
            position: relative;
            cursor: grab;
        }
        #globe-container:active {
            cursor: grabbing;
        }
        .location-list {
            margin-top: 2rem;
        }
        .location-list h2 {
            margin-bottom: 0.5rem;
        }
        .location-list ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1.5rem;
        }
        .location-list li {
            color: #555;
        }
        .location-list li::before {
            content: "\1F4CD ";
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="travels.html" class="active">Travels</a>
        <a href="blog.html">Blog</a>
    </nav>
    <main>
        <h1>Travels</h1>
        <div id="globe-container"></div>
        <div class="location-list">
            <h2>Places I've been</h2>
            <ul id="location-list"></ul>
        </div>
    </main>

    <script src="https://unpkg.com/globe.gl@2.35.1/dist/globe.gl.min.js"></script>
    <script>
        // Add your locations here — just add a new entry with name, lat, lng
        const locations = [
            { name: "New York, USA", lat: 40.7128, lng: -74.0060 },
            { name: "London, UK", lat: 51.5074, lng: -0.1278 },
            { name: "Tokyo, Japan", lat: 35.6762, lng: 139.6503 },
        ];

        // Build the globe
        const container = document.getElementById("globe-container");
        const globe = Globe()
            .globeImageUrl("https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg")
            .bumpImageUrl("https://unpkg.com/three-globe/example/img/earth-topology.png")
            .backgroundImageUrl("https://unpkg.com/three-globe/example/img/night-sky.png")
            .pointsData(locations)
            .pointLat("lat")
            .pointLng("lng")
            .pointColor(() => "#ff4444")
            .pointRadius(0.5)
            .pointAltitude(0.01)
            .pointLabel("name")
            .width(container.clientWidth)
            .height(container.clientHeight)
            (container);

        // Auto-rotate
        globe.controls().autoRotate = true;
        globe.controls().autoRotateSpeed = 0.5;

        // Stop auto-rotate on interaction, resume after
        globe.controls().addEventListener("start", () => {
            globe.controls().autoRotate = false;
        });
        globe.controls().addEventListener("end", () => {
            setTimeout(() => { globe.controls().autoRotate = true; }, 3000);
        });

        // Resize handling
        window.addEventListener("resize", () => {
            globe.width(container.clientWidth);
            globe.height(container.clientHeight);
        });

        // Populate the text list
        const listEl = document.getElementById("location-list");
        locations.forEach(loc => {
            const li = document.createElement("li");
            li.textContent = loc.name;
            listEl.appendChild(li);
        });
    </script>
</body>
</html>
