    </footer>

    <script src="blog-data.js"></script>
    <script>
        var list = document.getElementById("blog-list");

        if (!BLOG_POSTS || BLOG_POSTS.length === 0) {
            list.innerHTML = '<p class="empty-state">Posts coming soon.</p>';
        } else {
            BLOG_POSTS.forEach(function(post) {
                var parts = post.date.split("-");
                var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
                var dateStr = months[parseInt(parts[1]) - 1] + " " + parseInt(parts[2]) + ", " + parts[0];

                var div = document.createElement("div");
                div.className = "blog-post";
                div.innerHTML =
                    '<div class="blog-date">' + dateStr + '</div>' +
                    '<div>' +
                        '<a href="' + post.url + '" class="blog-title">' + post.title + '</a>' +
                        '<p class="blog-summary">' + post.summary + '</p>' +
                        '<a href="' + post.url + '" class="blog-read-more">Read the post →</a>' +
                    '</div>';
                list.appendChild(div);
            });
        }
    </script>
</body>
