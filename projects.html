<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Jeff Sayre</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .sub-nav {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.75rem;
        }
        .sub-nav a {
            text-decoration: none;
            color: #888;
            font-size: 0.95rem;
            cursor: pointer;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid transparent;
            margin-bottom: -0.8rem;
        }
        .sub-nav a.active {
            color: #000;
            font-weight: 600;
            border-bottom-color: #000;
        }
        .sub-nav a:hover {
            color: #333;
        }
        .project-section {
            display: none;
        }
        .project-section.active {
            display: block;
        }
        .project {
            margin-bottom: 2.5rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #eee;
        }
        .project:last-child {
            border-bottom: none;
        }
        .project h2 {
            margin-bottom: 0.25rem;
        }
        .project h3 {
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }
        .project ul {
            padding-left: 1.5rem;
        }
        .project li {
            margin-bottom: 0.25rem;
        }
        .project-image {
            margin: 1rem 0;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
        }
        .project-image img {
            width: 100%;
            display: block;
        }
        .project-link {
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
        }
        .empty-state {
            color: #888;
            font-style: italic;
        }

        /* Project lightbox */
        .project-lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .project-lightbox.active {
            display: flex;
        }
        .project-lightbox img {
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
        }
        .project-lightbox-close {
            position: absolute;
            top: 1.25rem;
            right: 1.5rem;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            opacity: 0.7;
            background: none;
            border: none;
        }
        .project-lightbox-close:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">About</a>
        <a href="projects.html" class="active">Projects</a>
        <a href="photography.html">Photography</a>
        <a href="travels.html">Travels</a>
        <a href="blog.html">Blog</a>
    </nav>
    <main>
        <h1>Projects</h1>

        <div class="sub-nav" id="sub-nav">
            <a data-tab="data" class="active">Data</a>
            <a data-tab="engineering">Engineering</a>
            <a data-tab="design">Design</a>
        </div>

        <div class="project-section active" id="tab-data"></div>
        <div class="project-section" id="tab-engineering"></div>
        <div class="project-section" id="tab-design"></div>
    </main>

    <div class="project-lightbox" id="project-lightbox">
        <button class="project-lightbox-close" id="project-lightbox-close">&times;</button>
        <img id="project-lightbox-img" src="" alt="">
    </div>

    <script src="projects-data.js"></script>
    <script>
        var lightbox = document.getElementById("project-lightbox");
        var lightboxImg = document.getElementById("project-lightbox-img");

        function renderProjects(category, containerId) {
            var container = document.getElementById(containerId);
            var projects = PROJECTS[category];

            if (!projects || projects.length === 0) {
                container.innerHTML = '<p class="empty-state">Projects coming soon.</p>';
                return;
            }

            projects.forEach(function(p) {
                var section = document.createElement("section");
                section.className = "project";

                var html = '<h2>' + p.title + '</h2>';

                if (p.url) {
                    html += '<p class="project-link"><a href="' + p.url + '">' + p.url.replace('https://', '') + '</a></p>';
                }

                if (p.image) {
                    html += '<div class="project-image"><img src="' + p.image + '" alt="' + p.title + '" loading="lazy"></div>';
                }

                if (p.description) {
                    html += '<p>' + p.description + '</p>';
                }

                if (p.details) {
                    html += '<p>' + p.details + '</p>';
                }

                if (p.tech && p.tech.length > 0) {
                    html += '<h3>Tech Stack</h3><ul>';
                    p.tech.forEach(function(t) {
                        html += '<li>' + t + '</li>';
                    });
                    html += '</ul>';
                }

                section.innerHTML = html;

                // Click image to expand
                var img = section.querySelector(".project-image");
                if (img) {
                    img.addEventListener("click", function() {
                        lightboxImg.src = p.image;
                        lightbox.classList.add("active");
                        document.body.style.overflow = "hidden";
                    });
                }

                container.appendChild(section);
            });
        }

        renderProjects("data", "tab-data");
        renderProjects("engineering", "tab-engineering");
        renderProjects("design", "tab-design");

        // Tab switching
        var tabs = document.querySelectorAll("#sub-nav a");
        tabs.forEach(function(tab) {
            tab.addEventListener("click", function() {
                tabs.forEach(function(t) { t.classList.remove("active"); });
                document.querySelectorAll(".project-section").forEach(function(s) { s.classList.remove("active"); });
                tab.classList.add("active");
                document.getElementById("tab-" + tab.dataset.tab).classList.add("active");
            });
        });

        // Lightbox close
        document.getElementById("project-lightbox-close").addEventListener("click", function() {
            lightbox.classList.remove("active");
            document.body.style.overflow = "";
        });
        lightbox.addEventListener("click", function(e) {
            if (e.target === lightbox) {
                lightbox.classList.remove("active");
                document.body.style.overflow = "";
            }
        });
        document.addEventListener("keydown", function(e) {
            if (e.key === "Escape" && lightbox.classList.contains("active")) {
                lightbox.classList.remove("active");
                document.body.style.overflow = "";
            }
        });
    </script>
</body>
</html>
