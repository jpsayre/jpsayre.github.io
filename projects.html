<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Jeff Sayre</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="apple-touch-icon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="nav-brand">
            <a href="index.html" class="name">Jeff Sayre</a>
            <span class="subtitle">Chicago · engineer & data scientist</span>
        </div>
        <div class="nav-links">
            <a href="index.html">About</a>
            <a href="projects.html" class="active">Projects</a>
            <a href="photography.html">Photography</a>
            <a href="travels.html">Travels</a>
            <a href="blog.html">Blog</a>
        </div>
    </nav>

    <div class="title-block">
        <div class="section-label">§ Projects</div>
        <h1 class="page-title">Selected works.</h1>
    </div>

    <div class="sub-nav" id="sub-nav">
        <a data-tab="engineering" class="active">Engineering</a>
        <a data-tab="design">Design</a>
        <a data-tab="data">Data</a>
        <a data-tab="simulation">Modeling/Simulation</a>
    </div>

    <div class="project-section active" id="tab-engineering"></div>
    <div class="project-section" id="tab-data"></div>
    <div class="project-section" id="tab-design"></div>
    <div class="project-section" id="tab-simulation"></div>

    <footer>
        <span>© 2026 Jeff Sayre</span>
        <div class="footer-links">
            <span>jpsayre@gmail.com</span>
            <a href="https://www.linkedin.com/in/jeff-sayre-b3ab8924/" target="_blank">linkedin.com/in/jeff-sayre</a>
        </div>
    </footer>

    <script src="projects-data.js"></script>
    <script>
        function renderProjects(category, containerId) {
            var container = document.getElementById(containerId);
            var projects = PROJECTS[category];

            if (!projects || projects.length === 0) {
                container.innerHTML = '<p class="empty-state">Projects coming soon.</p>';
                return;
            }

            projects.forEach(function(p, i) {
                var row = document.createElement("div");
                row.className = "ledger-row";

                var num = String(i + 1).padStart(2, "0");
                var year = p.year || "";
                var note = p.note || "";

                // Build note from description if not set
                if (!note && p.description) {
                    note = p.description.substring(0, 80);
                    if (p.description.length > 80) note += "...";
                }

                var detailsHtml = "";
                if (p.description) {
                    detailsHtml += '<p>' + p.description + '</p>';
                }
                if (p.details) {
                    detailsHtml += '<p>' + p.details + '</p>';
                }
                if (p.patents && p.patents.length > 0) {
                    detailsHtml += '<h4>Patents</h4><ul>';
                    p.patents.forEach(function(pat) {
                        detailsHtml += '<li><a href="' + pat.url + '" target="_blank">' + pat.number + '</a> — ' + pat.title + '</li>';
                    });
                    detailsHtml += '</ul>';
                }
                if (p.tech && p.tech.length > 0) {
                    detailsHtml += '<h4>Tech</h4><ul>';
                    p.tech.forEach(function(t) {
                        detailsHtml += '<li>' + t + '</li>';
                    });
                    detailsHtml += '</ul>';
                }

                var imageHtml = '';
                if (p.image) {
                    imageHtml = '<div class="ledger-details-image"><img src="' + p.image + '" alt="' + p.title + '" loading="lazy"></div>';
                }

                row.innerHTML =
                    '<span class="ledger-num">№ ' + num + '</span>' +
                    '<div>' +
                        '<div class="ledger-title">' + p.title + '</div>' +
                        '<div class="ledger-note">' + note + '</div>' +
                        (p.url ? '<div class="ledger-note"><a href="' + p.url + '" target="_blank">' + p.url.replace('https://', '') + '</a></div>' : '') +
                        '<div class="ledger-details" id="detail-' + category + '-' + i + '"><div class="ledger-details-text">' + detailsHtml + '</div>' + imageHtml + '</div>' +
                    '</div>';

                row.addEventListener("click", function(e) {
                    if (e.target.tagName === "A") return;
                    var detail = document.getElementById("detail-" + category + "-" + i);
                    detail.classList.toggle("open");
                });

                container.appendChild(row);
            });
        }

        renderProjects("data", "tab-data");
        renderProjects("engineering", "tab-engineering");
        renderProjects("design", "tab-design");

        // Simulation tab uses a card grid instead of ledger rows
        (function() {
            var container = document.getElementById("tab-simulation");
            var items = PROJECTS.simulation;

            if (!items || items.length === 0) {
                container.innerHTML = '<p class="empty-state">Projects coming soon.</p>';
                return;
            }

            var hint = document.createElement("p");
            hint.className = "sim-hint";
            hint.textContent = "Click any project to interact with it.";
            container.appendChild(hint);

            var grid = document.createElement("div");
            grid.className = "sim-grid";

            items.forEach(function(item) {
                var card = document.createElement("a");
                card.className = "sim-card";
                card.href = item.url;

                var badge = item.type === "simulation" ? "Interactive" : "3D Model";

                card.innerHTML =
                    '<img src="' + item.thumbnail + '" alt="' + item.title + '" loading="lazy">' +
                    '<div class="sim-card-badge">' + badge + '</div>' +
                    '<div class="sim-card-overlay">' +
                        '<div class="sim-card-title">' + item.title + '</div>' +
                        '<div class="sim-card-note">' + (item.note || '') + '</div>' +
                    '</div>';

                grid.appendChild(card);
            });

            container.appendChild(grid);
        })();

        // Tab switching
        var tabs = document.querySelectorAll("#sub-nav a");
        tabs.forEach(function(tab) {
            tab.addEventListener("click", function() {
                tabs.forEach(function(t) { t.classList.remove("active"); });
                document.querySelectorAll(".project-section").forEach(function(s) { s.classList.remove("active"); });
                tab.classList.add("active");
                document.getElementById("tab-" + tab.dataset.tab).classList.add("active");
            });
        });
    </script>
</body>
</html>
